# Frontend container's nginx — serves the Next.js static export and proxies
# /api + /health to the BFF container over the docker-compose network. Only
# this container is published to the host; engines stay internal.

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain text/css text/javascript text/xml
    application/json application/javascript application/xml+rss
    application/manifest+json
    image/svg+xml;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 4M;

    # Next.js static export: paths map to <name>.html. Don't cache the HTML
    # so deploys roll out immediately; hashed _next assets are immutable.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Content-hashed Next.js assets — cache hard.
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # BFF API — same-origin from the browser, proxied to the backend container.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://backend:8080;
        access_log off;
    }
}
